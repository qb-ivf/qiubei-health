# 逑贝互联网医院 · 运营后台 admin-web（静态站点 + 同源 /api 反代 + 访问门禁）
# 放置到：/etc/nginx/conf.d/admin.qb-medical.cn.conf
#
# ⚠️ 当前后端 admin 登录为 mock（任意账号可登入），公网暴露前必须加门禁：
#   1) HTTP Basic Auth（下方 auth_basic）—— 必做
#   2) 可选：IP 白名单（allow/deny）—— 只让医院办公网段访问，更稳

server {
    listen 80;
    server_name admin.qb-medical.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.qb-medical.cn;

    ssl_certificate     /etc/nginx/ssl/admin.qb-medical.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.qb-medical.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # —— 可选：仅放行医院办公网段（按需取消注释并改成你的出口 IP）——
    # allow 1.2.3.4;        # 办公出口公网 IP
    # deny  all;

    root /var/www/admin-web;
    index index.html;

    # 静态页面/资源：加 Basic Auth 门禁（挡住公网随意访问 UI）
    location / {
        auth_basic           "Restricted - 逑贝运营后台";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;
        try_files $uri $uri/ /index.html;
    }

    # 同源 API 反代到后端（无需 CORS）；后端路由前缀为 /api/v1
    # ⚠️ 这里必须关闭 Basic Auth：API 由应用自身登录(JWT)鉴权，
    #    若叠加 Basic，前端 XHR 收到 401-Basic 会反复弹原生登录框。
    location /api/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
