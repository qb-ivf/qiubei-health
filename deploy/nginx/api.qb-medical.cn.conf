# 逑贝互联网医院 · 后端 API 反向代理 + HTTPS
# 放置到 CentOS 7：/etc/nginx/conf.d/api.qb-medical.cn.conf
# 证书路径按阿里云免费证书下载的 Nginx 格式文件名调整。

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name api.qb-medical.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 反向代理到后端容器（127.0.0.1:8000）
server {
    listen 443 ssl;
    server_name api.qb-medical.cn;

    # —— 阿里云免费 SSL 证书（Nginx 格式）——
    ssl_certificate     /etc/nginx/ssl/api.qb-medical.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/api.qb-medical.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # 微信支付回调体可能较大；关闭对回调路径的缓冲，确保原始 body 透传（验签依赖原文）
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 信令（/ws）升级支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
